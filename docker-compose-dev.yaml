services:
    redis:
        image: redis:latest
        hostname: ${RABBITTMQ_HOST}
        environment:
            - REDIS_PASSWORD=${REDIS_USER_PASSWORD}
            - REDIS_USER=${REDIS_USER}
            - REDIS_USER_PASSWORD=${REDIS_USER_PASSWORD}
        ports:
            - ${REDIS_PORT}:${REDIS_CONTAINER_PORT}
        deploy:
            resources:
                limits:
                   cpus: '0.50'
                   memory: 512M
                reservations:
                   cpus: '0.25'
                   memory: 256M
        command: >
            sh -c '
                mkdir -p /usr/local/etc/redis &&
                echo "bind 0.0.0.0" > /usr/local/etc/redis/redis.conf &&
                echo "requirepass $REDIS_USER_PASSWORD" >> /usr/local/etc/redis/redis.conf &&
                echo "appendonly yes" >> /usr/local/etc/redis/redis.conf &&
                echo "appendfsync everysec" >> /usr/local/etc/redis/redis.conf &&
                echo "user default on nopass ~* +@all" > /usr/local/etc/redis/users.acl &&
                echo "user $REDIS_USER on >$REDIS_USER_PASSWORD ~* +@all" >> /usr/local/etc/redis/users.acl &&
                redis-server /usr/local/etc/redis/redis.conf --aclfile /usr/local/etc/redis/users.acl
            '
        healthcheck:
            test: ["CMD", "redis-cli", "-a", "$REDIS_USER_PASSWORD", "ping"]
            interval: 30s
            timeout: 10s
            retries: 5
        tty: true
        stdin_open: true
    db_dev:
        hostname: ${POSTGRES_HOST}
        image: postgres:latest
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            PGDATA: /var/lib/postgresql/data/pgdata
        ports:
            - ${POSTGRES_PORT}:${POSTGRES_CONTAINER_PORT}
        volumes:
            - postgres_drf:/var/lib/postgresql/data/pgdata
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        
    rabbitmq:
        image: rabbitmq:3-management-alpine
        hostname: ${RABBITTMQ_HOST}
        ports:
            - "${RABBITMQ_PORT}:${RABBITMQ_CONTAINER_PORT}"
            - "${RABBITMQ_MANAGEMENT_PORT}:${RABBITMQ_MANAGEMENT_CONTAINER_PORT}"
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
        volumes:
            - rabbitmq-drf:/var/lib/rabbitmq

        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

volumes:
    postgres_drf:
    rabbitmq-drf: